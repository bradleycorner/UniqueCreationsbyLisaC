<!DOCTYPE html>
<html lang="en" data-theme="blossom">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Creations by Lisa C. | Handmade Jewelry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"Lato"', 'sans-serif'] },
                    colors: {
                        primary: { 50: 'rgb(var(--primary-50) / <alpha-value>)', 100: 'rgb(var(--primary-100) / <alpha-value>)', 200: 'rgb(var(--primary-200) / <alpha-value>)', 300: 'rgb(var(--primary-300) / <alpha-value>)', 400: 'rgb(var(--primary-400) / <alpha-value>)', 500: 'rgb(var(--primary-500) / <alpha-value>)', 600: 'rgb(var(--primary-600) / <alpha-value>)', 700: 'rgb(var(--primary-700) / <alpha-value>)', 800: 'rgb(var(--primary-800) / <alpha-value>)', 900: 'rgb(var(--primary-900) / <alpha-value>)' },
                        secondary: { 50: 'rgb(var(--secondary-50) / <alpha-value>)', 100: 'rgb(var(--secondary-100) / <alpha-value>)', 200: 'rgb(var(--secondary-200) / <alpha-value>)', 300: 'rgb(var(--secondary-300) / <alpha-value>)', 400: 'rgb(var(--secondary-400) / <alpha-value>)', 500: 'rgb(var(--secondary-500) / <alpha-value>)', 600: 'rgb(var(--secondary-600) / <alpha-value>)', 700: 'rgb(var(--secondary-700) / <alpha-value>)', 800: 'rgb(var(--secondary-800) / <alpha-value>)', 900: 'rgb(var(--secondary-900) / <alpha-value>)' },
                        neutral: { 50: 'rgb(var(--neutral-50) / <alpha-value>)', 100: 'rgb(var(--neutral-100) / <alpha-value>)', 200: 'rgb(var(--neutral-200) / <alpha-value>)', 300: 'rgb(var(--neutral-300) / <alpha-value>)', 400: 'rgb(var(--neutral-400) / <alpha-value>)', 500: 'rgb(var(--neutral-500) / <alpha-value>)', 600: 'rgb(var(--neutral-600) / <alpha-value>)', 700: 'rgb(var(--neutral-700) / <alpha-value>)', 800: 'rgb(var(--neutral-800) / <alpha-value>)', 900: 'rgb(var(--neutral-900) / <alpha-value>)' }
                    }
                }
            }
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        :root[data-theme="blossom"] {
            --primary-50: 255 241 242; --primary-100: 255 228 230; --primary-200: 254 205 211; --primary-300: 253 164 175; --primary-400: 251 113 133; --primary-500: 244 63 94; --primary-600: 225 29 72; --primary-700: 190 18 60; --primary-800: 159 18 57; --primary-900: 136 19 55;
            --secondary-50: 240 253 244; --secondary-100: 220 252 231; --secondary-200: 187 247 208; --secondary-300: 134 239 172; --secondary-400: 74 222 128; --secondary-500: 34 197 94; --secondary-600: 22 163 74; --secondary-700: 21 128 61; --secondary-800: 22 101 52; --secondary-900: 20 83 45;
            --neutral-50: 250 250 249; --neutral-100: 245 245 244; --neutral-200: 231 229 228; --neutral-300: 214 211 209; --neutral-400: 168 162 158; --neutral-500: 120 113 108; --neutral-600: 87 83 78; --neutral-700: 68 64 60; --neutral-800: 41 37 36; --neutral-900: 28 25 23;
        }
        :root[data-theme="ocean"] {
            --primary-50: 240 249 255; --primary-100: 224 242 254; --primary-200: 186 230 253; --primary-300: 125 211 252; --primary-400: 56 189 248; --primary-500: 14 165 233; --primary-600: 2 132 199; --primary-700: 3 105 161; --primary-800: 7 89 133; --primary-900: 12 74 110;
            --secondary-50: 240 253 250; --secondary-100: 204 251 241; --secondary-200: 153 246 228; --secondary-300: 94 234 212; --secondary-400: 45 212 191; --secondary-500: 20 184 166; --secondary-600: 13 148 136; --secondary-700: 15 118 110; --secondary-800: 17 94 89; --secondary-900: 19 78 74;
            --neutral-50: 248 250 252; --neutral-100: 241 245 249; --neutral-200: 226 232 240; --neutral-300: 203 213 225; --neutral-400: 148 163 184; --neutral-500: 100 116 139; --neutral-600: 71 85 105; --neutral-700: 51 65 85; --neutral-800: 30 41 59; --neutral-900: 15 23 42;
        }
        :root[data-theme="luxury"] {
            --primary-50: 255 251 235; --primary-100: 254 243 199; --primary-200: 253 230 138; --primary-300: 252 211 77; --primary-400: 251 191 36; --primary-500: 245 158 11; --primary-600: 217 119 6; --primary-700: 180 83 9; --primary-800: 146 64 14; --primary-900: 120 53 15;
            --secondary-50: 236 253 245; --secondary-100: 209 250 229; --secondary-200: 167 243 208; --secondary-300: 110 231 183; --secondary-400: 52 211 153; --secondary-500: 16 185 129; --secondary-600: 5 150 105; --secondary-700: 4 120 87; --secondary-800: 6 95 70; --secondary-900: 6 78 59;
            --neutral-50: 249 250 251; --neutral-100: 243 244 246; --neutral-200: 229 231 235; --neutral-300: 209 213 219; --neutral-400: 156 163 175; --neutral-500: 107 114 128; --neutral-600: 75 85 99; --neutral-700: 55 65 81; --neutral-800: 31 41 55; --neutral-900: 17 24 39;
        }
    </style>
</head>
<body class="font-sans text-neutral-800 bg-neutral-50 antialiased flex flex-col min-h-screen">
    <div id="toast" class="fixed top-24 right-5 bg-neutral-900 text-white px-6 py-4 rounded shadow-lg transform translate-x-full transition-transform duration-300 z-50 flex items-center gap-3">
        <span id="toast-icon-container"><i data-lucide="check-circle" class="w-5 h-5 text-secondary-500"></i></span>
        <span id="toast-message"></span>
    </div>

    <nav class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-neutral-100 shadow-sm h-24 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <div class="flex items-center cursor-pointer gap-3" onclick="navigateToPage('home')">
                <div class="h-16 w-16 rounded-lg border flex items-center justify-center bg-white font-serif text-2xl font-bold">UC</div>
                <div class="hidden sm:block leading-none"><span class="block font-serif text-xl font-bold">Unique Creations</span><span class="block text-sm text-primary-800 tracking-widest uppercase mt-1">By Lisa C.</span></div>
            </div>
            <div class="hidden md:flex space-x-8">
                <button onclick="navigateToPage('home')" class="hover:text-primary-800 font-medium uppercase text-sm">Home</button>
                <button onclick="navigateToPage('shop')" class="hover:text-primary-800 font-medium uppercase text-sm">Shop</button>
                <button onclick="navigateToPage('about')" class="hover:text-primary-800 font-medium uppercase text-sm">About</button>
                <button onclick="navigateToPage('contact')" class="hover:text-primary-800 font-medium uppercase text-sm">Contact</button>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleCart()" class="relative p-2 hover:bg-neutral-50 rounded-full">
                    <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-primary-800 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full opacity-0">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <div id="view-home" class="page-view py-20 px-4 max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-12">
            <div class="md:w-1/2">
                <h1 class="text-5xl font-serif font-bold text-neutral-900 mb-6">Handcrafted with <span class="text-primary-800 italic">elegance & intention.</span></h1>
                <p class="text-lg text-neutral-600 mb-8">Specializing in intricate chainmail and beadwork that tells your story.</p>
                <button onclick="navigateToPage('shop')" class="px-8 py-3 bg-neutral-900 text-white rounded font-medium">Shop Now</button>
            </div>
            <div class="md:w-1/2"><img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=800&q=80" class="rounded-lg shadow-xl h-96 w-full object-cover"></div>
        </div>

        <div id="view-shop" class="page-view hidden py-16 px-4">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-3xl font-serif font-bold text-center mb-12 uppercase tracking-widest text-neutral-900">Collections</h2>
                <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-0 z-50 pointer-events-none transition-all">
        <div id="cart-overlay" class="absolute inset-0 bg-neutral-900/75 opacity-0 transition-opacity" onclick="toggleCart()"></div>
        <div id="cart-panel" class="absolute inset-y-0 right-0 w-full max-w-md bg-white shadow-xl transform translate-x-full transition-transform flex flex-col pointer-events-auto">
            <div class="p-6 border-b flex justify-between items-center"><h2 class="text-xl font-serif font-bold">Shopping Bag</h2><button onclick="toggleCart()"><i data-lucide="x" class="w-6 h-6"></i></button></div>
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-6"></div>
            <div class="p-6 bg-neutral-50 border-t space-y-4">
                <div class="flex justify-between font-bold text-xl"><span>Total</span><span id="cart-total">$0.00</span></div>
                <button class="w-full py-4 bg-neutral-900 text-white rounded font-bold uppercase tracking-widest">Checkout</button>
            </div>
        </div>
    </div>

    <div id="product-modal" class="fixed inset-0 z-50 overflow-y-auto hidden">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="fixed inset-0 bg-neutral-900/80 transition-opacity" onclick="closeProductModal()"></div>
            <div class="relative bg-white rounded-lg shadow-2xl max-w-5xl w-full overflow-hidden flex flex-col md:flex-row">
                <button onclick="closeProductModal()" class="absolute top-4 right-4 z-10 p-2 hover:bg-neutral-100 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
                <div class="md:w-1/2 p-6 bg-stone-50 flex flex-col">
                    <img id="modal-main-image" src="" class="w-full aspect-square object-cover rounded shadow-md">
                    <div id="modal-thumbnails" class="flex gap-2 mt-4 overflow-x-auto pb-2 scrollbar-hide"></div>
                </div>
                <div class="md:w-1/2 p-8 flex flex-col bg-white">
                    <div class="flex-grow">
                        <h2 id="modal-title-text" class="text-3xl font-serif font-bold text-neutral-900 mb-2"></h2>
                        <p id="modal-price" class="text-2xl font-medium text-neutral-900 mb-8"></p>
                        <div id="modal-options-container" class="space-y-6 mb-8"></div>
                        <div class="prose prose-neutral">
                            <h4 class="text-[10px] font-bold uppercase text-neutral-400 tracking-widest mb-2 border-b pb-1">Product Details</h4>
                            <p id="modal-description" class="text-neutral-600 text-sm whitespace-pre-line leading-relaxed h-48 overflow-y-auto pr-2 scrollbar-hide"></p>
                        </div>
                    </div>
                    <button id="modal-add-btn" class="w-full py-4 bg-neutral-900 text-white font-bold uppercase tracking-widest rounded-md mt-8">Add to Bag</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = []; let cart = []; let isCartOpen = false;

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            await fetchCatalog();
            renderProducts('all');
            updateCartUI();
        });

        async function fetchCatalog() {
            try {
                const response = await fetch('/api/square-inventory');
                const data = await response.json();
                if (data.objects) {
                    const imageMap = {};
                    const optionMap = {};
                    
                    if (data.related_objects) {
                        data.related_objects.forEach(o => {
                            if (o.type === 'IMAGE') imageMap[o.id] = o.image_data.url;
                            if (o.type === 'ITEM_OPTION') optionMap[o.id] = o.item_option_data;
                        });
                    }

                    products = data.objects.filter(o => o.type === 'ITEM').map(item => {
                        const d = item.item_data;
                        const allImg = [...(d.image_ids || [])];
                        d.variations.forEach(v => { if (v.item_variation_data.image_ids) allImg.push(...v.item_variation_data.image_ids); });
                        
                        return {
                            id: item.id, name: d.name, variations: d.variations, 
                            modifiers: d.modifier_lists || [], 
                            options: (d.item_options || []).map(o => ({ id: o.item_option_id, ...optionMap[o.item_option_id] })),
                            image: imageMap[allImg[0]] || "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=500&q=80",
                            images: [...new Set(allImg)].map(id => imageMap[id]).filter(Boolean),
                            desc: d.description || "Handcrafted with intention."
                        };
                    });
                }
            } catch (e) { console.error(e); }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid'); grid.innerHTML = '';
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'group bg-white rounded-lg border border-neutral-100 overflow-hidden flex flex-col shadow-sm hover:shadow-xl transition-all cursor-pointer';
                div.onclick = () => openProductModal(p.id);
                div.innerHTML = `<div class="h-80 relative overflow-hidden"><img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"></div>
                    <div class="p-6">
                        <h3 class="font-serif text-lg text-neutral-900">${p.name}</h3>
                        <p class="font-medium text-neutral-900">$${(p.variations[0].item_variation_data.price_money.amount/100).toFixed(2)}</p>
                    </div>`;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        function openProductModal(id) {
            const p = products.find(prod => prod.id === id); if (!p) return;
            document.getElementById('modal-title-text').textContent = p.name;
            document.getElementById('modal-description').textContent = p.desc;
            document.getElementById('modal-main-image').src = p.image;
            
            const opt = document.getElementById('modal-options-container'); opt.innerHTML = '';
            
            // 1. SIZE/VARIATION
            if (p.variations.length > 1) {
                const div = document.createElement('div');
                div.innerHTML = `<label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest block mb-2">Size / Style <span class="text-primary-800">*</span></label>
                    <select id="modal-var-select" onchange="updateModalPrice('${id}')" class="w-full p-3 border rounded-md text-sm bg-white outline-none">
                        ${p.variations.map(v => `<option value="${v.id}">${v.item_variation_data.name} - $${(v.item_variation_data.price_money.amount/100).toFixed(2)}</option>`).join('')}
                    </select>`;
                opt.appendChild(div);
            }

            // 2. ITEM OPTIONS (The Colors!)
            p.options.forEach(o => {
                const div = document.createElement('div');
                div.innerHTML = `<label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest block mb-2">${o.display_name} <span class="text-primary-800">*</span></label>
                    <select class="modal-opt-select w-full p-3 border rounded-md text-sm bg-white outline-none">
                        <option value="">Select ${o.name}...</option>
                        ${o.values.map(val => `<option value="${val.id}">${val.item_option_value_data.name}</option>`).join('')}
                    </select>`;
                opt.appendChild(div);
            });

            // 3. MODIFIERS
            p.modifiers.forEach(m => {
                const div = document.createElement('div');
                div.innerHTML = `<label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest block mb-2">${m.modifier_list_data.name} <span class="text-primary-800">*</span></label>
                    <select class="modal-mod-select w-full p-3 border rounded-md text-sm bg-white outline-none">
                        <option value="">Select custom...</option>
                        ${m.modifier_list_data.modifiers.map(mod => `<option value="${mod.id}">${mod.modifier_data.name}</option>`).join('')}
                    </select>`;
                opt.appendChild(div);
            });

            const thumbs = document.getElementById('modal-thumbnails'); thumbs.innerHTML = '';
            p.images.forEach(url => {
                const b = document.createElement('button'); b.className = "w-20 h-20 rounded border flex-shrink-0";
                b.innerHTML = `<img src="${url}" class="w-full h-full object-cover rounded">`;
                b.onclick = () => { document.getElementById('modal-main-image').src = url; };
                thumbs.appendChild(b);
            });

            updateModalPrice(id);
            document.getElementById('modal-add-btn').onclick = () => addToBag(id);
            document.getElementById('product-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function updateModalPrice(id) {
            const p = products.find(prod => prod.id === id);
            const vid = document.getElementById('modal-var-select')?.value || p.variations[0].id;
            const v = p.variations.find(v => v.id === vid);
            document.getElementById('modal-price').textContent = `$${(v.item_variation_data.price_money.amount/100).toFixed(2)}`;
        }

        function addToBag(id) {
            const p = products.find(prod => prod.id === id);
            const vid = document.getElementById('modal-var-select')?.value || p.variations[0].id;
            const v = p.variations.find(varObj => varObj.id === vid);
            
            const selects = [...document.querySelectorAll('.modal-opt-select'), ...document.querySelectorAll('.modal-mod-select')];
            for (let s of selects) { if (!s.value) { showToast("Please select required options", true); return; } }
            
            const opts = selects.map(s => s.options[s.selectedIndex].text);
            const cid = `${id}-${vid}-${opts.join('-')}`;
            const ex = cart.find(i => i.cid === cid);
            if (ex) { ex.qty++; } else {
                cart.push({ cid, id, name: p.name, vname: v.item_variation_data.name, price: v.item_variation_data.price_money.amount/100, image: p.image, qty: 1, opts });
            }
            showToast(`Added ${p.name} to bag`);
            updateCartUI(); closeProductModal();
        }

        function updateCartUI() {
            const sub = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cart-total').textContent = `$${sub.toFixed(2)}`;
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-count').textContent = count;
            document.getElementById('cart-count').classList.toggle('opacity-0', count === 0);
            const cont = document.getElementById('cart-items-container');
            if (cart.length === 0) { cont.innerHTML = '<p class="text-center text-neutral-400 py-10">Empty.</p>'; }
            else {
                cont.innerHTML = cart.map(i => `<div class="flex gap-4 py-4 border-b">
                    <img src="${i.image}" class="h-16 w-16 object-cover rounded">
                    <div class="flex-1"><p class="font-bold text-sm">${i.name}</p><p class="text-[10px] text-neutral-500">${i.vname} ${i.opts.length ? '· ' + i.opts.join(', ') : ''}</p><div class="flex justify-between items-center mt-2"><span class="text-sm">$${i.price.toFixed(2)}</span><button onclick="removeFromCart('${i.cid}')" class="text-xs text-primary-800 font-bold">Remove</button></div></div>
                </div>`).join('');
            }
        }

        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); updateCartUI(); }
        function toggleCart() { const s = document.getElementById('cart-sidebar'); const o = document.getElementById('cart-overlay'); const p = document.getElementById('cart-panel'); isCartOpen = !isCartOpen; s.classList.toggle('pointer-events-none', !isCartOpen); o.classList.toggle('opacity-0', !isCartOpen); p.classList.toggle('translate-x-full', !isCartOpen); }
        function navigateToPage(id) { document.querySelectorAll('.page-view').forEach(v => v.classList.add('hidden')); document.getElementById(`view-${id}`).classList.remove('hidden'); window.scrollTo(0,0); }
        function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); document.body.style.overflow = ''; }
        function showToast(m, isErr = false) { const t = document.getElementById('toast'); document.getElementById('toast-message').textContent = m; document.getElementById('toast-icon-container').innerHTML = isErr ? '<i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>' : '<i data-lucide="check-circle" class="w-5 h-5 text-secondary-500"></i>'; lucide.createIcons(); t.classList.remove('translate-x-full'); setTimeout(() => t.classList.add('translate-x-full'), 3000); }
        function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); }
    </script>
</body>
</html>
